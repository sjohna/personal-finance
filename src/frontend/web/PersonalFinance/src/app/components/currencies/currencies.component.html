<div class="grid grid-cols-3 px-1 font-semibold text-lg">
  <div class="p-1">Name</div>
  <div class="p-1">Abbreviation</div>
  <div class="p-1">Created At</div>
</div>
<div class="grid grid-cols-3 px-1" *ngFor="let currency of currencies$ | async">
  <div class="p-1">{{currency.name}}</div>
  <div class="p-1">{{currency.abbreviation}}</div>
  <div class="p-1">{{currency.createdAt}}</div>
</div>
